<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danh mục - YAME</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{font-family:Roboto, sans-serif}
    .cat-card{cursor:pointer}
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">YAME CLONE</a>
    <div>
      <a class="btn btn-outline-light btn-sm" href="/">Trang chủ</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <h3>Danh mục</h3>
  <div id="catList" class="row gy-3">
    <div class="col-12 text-muted">Đang tải danh mục...</div>
  </div>
  <hr/>
  <h4>Sản phẩm của danh mục: <span id="catTitle">(chưa chọn)</span></h4>
  <div id="catProducts" class="row gy-3">
    <div class="col-12 text-muted">Chọn danh mục để xem sản phẩm</div>
  </div>
</div>

<script>
const API = { categories: '/api/Category', products: '/api/Product' };

async function loadCats(){
  const res = await fetch(API.categories);
  if(!res.ok) { document.getElementById('catList').innerHTML='<div class="col-12 text-danger">Lỗi tải danh mục</div>'; return; }
  const cats = await res.json();
  const el = document.getElementById('catList'); el.innerHTML='';
  cats.forEach(c=>{
    const div = document.createElement('div'); div.className='col-6 col-md-3';
    div.innerHTML = `<div class="card p-2 cat-card" data-id="${c.categoryId}"><div class="card-body"><strong>${c.name}</strong><div class="text-muted">Sản phẩm: ${ (c.products?c.products.length:0) }</div></div></div>`;
    div.querySelector('.cat-card').addEventListener('click', ()=> loadCatProducts(c.categoryId, c.name));
    el.appendChild(div);
  });
}

async function loadCatProducts(id, name){
  document.getElementById('catTitle').innerText = name;
  const res = await fetch(API.products + '/category/' + id);
  if(!res.ok){ document.getElementById('catProducts').innerHTML = '<div class="col-12 text-danger">Lỗi tải sản phẩm</div>'; return; }
  const prods = await res.json();
  const el = document.getElementById('catProducts'); el.innerHTML = '';
  if(!prods.length) { el.innerHTML = '<div class="col-12 text-muted">Không có sản phẩm trong danh mục này</div>'; return; }
  prods.forEach(p=>{ el.innerHTML += `<div class="col-6 col-md-3"><div class="card p-2"><img src="${p.imageUrl||'https://via.placeholder.com/300x400'}" class="img-fluid"/><div class="card-body"><strong>${p.name}</strong><div class="text-danger">${ (p.productVariants&&p.productVariants.length? p.productVariants[0].price : p.price) } VNĐ</div></div></div></div>`});
}

loadCats();
</script>
</body>
</html>
